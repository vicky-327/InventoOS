databases:
  - name: inventory-db
    databaseName: inventory_db
    plan: free
    region: oregon

services:
  # Redis
  - type: redis
    name: inventory-redis
    plan: free
    region: oregon
    ipAllowList: []

  # Backend Web Service
  - type: web
    name: inventoos-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: inventory-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PROJECT_NAME
        value: InventoOS

  # REMOVED: inventoos-worker (Service type 'worker' is not available on Render Free Plan)

  # Frontend Static Site
  - type: web
    name: inventoos-frontend
    env: static
    # region and plan excluded for static env to avoid validation errors
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://inventoos-api.onrender.com/api/v1"
