databases:
  - name: inventory-db
    databaseName: inventory_db
    plan: free
    region: oregon

services:
  # Redis
  - type: redis
    name: inventory-redis
    plan: free
    region: oregon
    ipAllowList: []

  # Backend Web Service
  - type: web
    name: inventoos-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: inventory-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  # Celery Worker
  - type: worker
    name: inventoos-worker
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: "celery -A app.workers.celery_app worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: inventory-redis
          property: connectionString

  # Frontend Static Site
  - type: web
    name: inventoos-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishDir: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: inventoos-api
          property: url
