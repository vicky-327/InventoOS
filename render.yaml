databases:
  - name: inventory-db
    databaseName: inventory_db
    plan: free
    region: oregon

services:
  # Redis
  - type: redis
    name: inventory-redis
    plan: free
    region: oregon
    ipAllowList: []

  # Backend Web Service
  - type: web
    name: inventoos-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: inventory-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PROJECT_NAME
        value: InventoOS

  # Celery Worker
  - type: worker
    name: inventoos-worker
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A app.workers.celery_app worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: inventory-redis
          property: connectionString

  # Frontend Static Site
  - type: web
    name: inventoos-frontend
    env: static
    # region: oregon  <-- REMOVED (static sites cannot have a region)
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        # Using deterministic URL as Render Blueprints don't support 'property: url' for static build env
        value: "https://inventoos-api.onrender.com/api/v1"
